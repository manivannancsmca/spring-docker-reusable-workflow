name: Reusable Spring Boot CI

on:
  workflow_call:
    inputs:
      docker-image-name:
        description: 'The name of the Docker image (e.g., my-app)'
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  # Everything is consolidated into this single, efficient job
  docker-build-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull the repository code (required so Docker can find your Dockerfile and src)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (enables high-performance caching for multi-stage builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to Docker Hub using securely passed secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build the multi-stage Dockerfile and push the final image
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Leveraging Docker layer caching so subsequent builds are lightning fast
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:${{ github.sha }}